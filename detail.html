<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wevre</title>
    <script
      src="https://cdn.socket.io/4.6.0/socket.io.min.js"
      integrity="sha384-c79GN5VsunZvi+Q/WObgk2in0CbZsHnjEqvFxC5DxHn9lTfNce2WW6h2pH6u/kF+"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <h1></h1>
    <pre id="messages" style="height: 400px; overflow: scroll"></pre>
    <input
      type="text"
      id="messageBox"
      placeholder="입찰 가격을 입력하세요."
      style="display: block; width: 100%; margin-bottom: 10px; padding: 10px"
    />
    <button id="send" title="Send Message!" style="width: 100%; height: 30px">
      입찰
    </button>

    <script>
      // Parse the query parameters from the URL
      function getQueryParams() {
        const queryParams = {};
        const queryString = window.location.search.slice(1);
        const paramPairs = queryString.split('&');
        paramPairs.forEach((pair) => {
          const [key, value] = pair.split('=');
          queryParams[key] = decodeURIComponent(value);
        });
        return queryParams;
      }

      // Get the item name from the query parameters
      const queryParams = getQueryParams();
      const itemName = queryParams.itemName;

      // Use the item name as needed
      if (itemName) {
        // You can display the item name or use it for further actions
        document.querySelector('h1').textContent = `${itemName} 실시간 경매방`;
      }

      (function () {
        const sendBtn = document.querySelector('#send');
        const messages = document.querySelector('#messages');
        const messageBox = document.querySelector('#messageBox');

        // Connect to the WebSocket server using Socket.IO
        const socket = io('http://127.0.0.1:3000', {
          withCredentials: true,
          auth: {
            token:
              'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjY0ZTk2YzVmM2UwNWYyMDBkMTg1Y2IwYyIsImlhdCI6MTY5NTM5MTQzMSwiZXhwIjoxNjk1NDc3ODMxfQ.qYsAeILCSV6E47idKdcdfuxg2fdtPHPCfmUEXT9OZb8',
          },
        }); // Update this URL

        socket.on('connect', () => {
          console.log('Connected to WebSocket server!');

          // Upon connecting, send a 'join' event to the server
          socket.emit('join', { itemName: itemName });
        });

        socket.on('message', (data) => {
          showMessage(data);
        });

        socket.on('disconnect', () => {
          console.log('Disconnected from WebSocket server!');
        });

        function showMessage(message) {
          messages.textContent += `\n\n${message}`;
          messages.scrollTop = messages.scrollHeight;
          messageBox.value = '';
        }

        sendBtn.onclick = function () {
          if (socket.connected) {
            // Send a message to the server with the 'message' event
            socket.emit('message', messageBox.value);
            showMessage(messageBox.value);
          } else {
            showMessage('No WebSocket connection :(');
          }
        };
      })();
    </script>
  </body>
</html>
