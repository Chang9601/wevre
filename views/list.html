<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>List</title>
    <script
      src="https://cdn.socket.io/4.6.0/socket.io.min.js"
      integrity="sha384-c79GN5VsunZvi+Q/WObgk2in0CbZsHnjEqvFxC5DxHn9lTfNce2WW6h2pH6u/kF+"
      crossorigin="anonymous"
    ></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
      }

      header {
        background-color: #333;
        color: white;
        text-align: center;
        padding: 10px;
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        text-align: center;
      }

      .item-container {
        border: 1px solid #ccc;
        margin: 10px;
        padding: 10px;
        text-align: center;
      }

      #item-list {
        list-style-type: none;
        padding: 0;
      }

      .pagination {
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>작품 목록</h1>
    </header>
    <div class="container">
      <label for="itemsPerPageInput">페이지 당 상품 개수: </label>
      <input type="number" id="itemsPerPageInput" value="10" />
      <button id="updateItemsPerPage">수정</button>

      <ul id="item-list"></ul>
      <div class="pagination">
        <button id="prevPage" disabled>이전</button>
        <button id="nextPage">다음</button>
      </div>
      <p id="totalItems"></p>
    </div>

    <script>
      function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return null;
      }

      const socket = io(`http://127.0.0.1:3000`, {
        withCredentials: true,
        extraHeaders: {
          access_token: getCookie('access_token'),
          session_id: getCookie('session_id'),
        },
      });

      socket.connect();
      socket.disconnect();

      let currentPage = 1;
      let itemsPerPage = 10;

      async function fetchItems(page, limit) {
        const response = await fetch(
          `http://127.0.0.1:3000/items?sort=high&skip=${page}&limit=${limit}`,
        );
        const data = await response.json();

        const itemList = document.getElementById('item-list');
        itemList.innerHTML = '';

        data.items.forEach((item) => {
          const itemContainer = document.createElement('div');
          itemContainer.classList.add('item-container');

          const listItem = document.createElement('li');
          listItem.textContent = item.itemName;
          listItem.addEventListener('click', () => {
            const startDate = new Date(item.startDate);
            const endDate = new Date(item.endDate);

            const startDateString = `${startDate.getFullYear()}-${String(
              startDate.getMonth() + 1,
            ).padStart(2, '0')}-${String(startDate.getDate()).padStart(
              2,
              '0',
            )}`;
            const endDateString = `${endDate.getFullYear()}-${String(
              endDate.getMonth() + 1,
            ).padStart(2, '0')}-${String(endDate.getDate()).padStart(2, '0')}`;

            const detailURL = `detail.html?itemName=${encodeURIComponent(
              item.itemName,
            )}&itemId=${encodeURIComponent(
              item._id,
            )}&startDate=${encodeURIComponent(
              startDateString,
            )}&endDate=${encodeURIComponent(endDateString)}`;

            window.location.href = detailURL;
          });

          itemContainer.appendChild(listItem);
          itemList.appendChild(itemContainer);
        });

        const prevPageButton = document.getElementById('prevPage');
        const nextPageButton = document.getElementById('nextPage');
        const totalItemsElement = document.getElementById('totalItems');

        prevPageButton.disabled = data.page === 1;
        nextPageButton.disabled = data.page === data.pages;

        currentPage = data.page;

        totalItemsElement.textContent = `상품 개수: ${data.count}`;
      }

      document
        .getElementById('updateItemsPerPage')
        .addEventListener('click', () => {
          const newItemsPerPage = parseInt(
            document.getElementById('itemsPerPageInput').value,
            10,
          );
          if (!isNaN(newItemsPerPage)) {
            itemsPerPage = newItemsPerPage;
            fetchItems(currentPage, itemsPerPage);
          }
        });

      document
        .getElementById('prevPage')
        .addEventListener('click', () =>
          fetchItems(currentPage - 1, itemsPerPage),
        );
      document
        .getElementById('nextPage')
        .addEventListener('click', () =>
          fetchItems(currentPage + 1, itemsPerPage),
        );

      fetchItems(currentPage, itemsPerPage);

      function displayItemDetails(item) {
        alert(`작품명: ${item.itemName}\n설명: ${item.description}`);
      }
    </script>
  </body>
</html>
