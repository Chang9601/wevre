<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detail</title>
    <script
      src="https://cdn.socket.io/4.6.0/socket.io.min.js"
      integrity="sha384-c79GN5VsunZvi+Q/WObgk2in0CbZsHnjEqvFxC5DxHn9lTfNce2WW6h2pH6u/kF+"
      crossorigin="anonymous"
    ></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        background-color: #f0f0f0;
      }

      h1 {
        text-align: center;
      }

      #messages {
        height: 400px;
        overflow: scroll;
        width: 90%;
        max-width: 600px;
      }

      #messageBox {
        display: block;
        width: 90%;
        margin-bottom: 10px;
        padding: 10px;
        max-width: 600px;
      }

      #send,
      #leave {
        width: 90%;
        height: 30px;
        max-width: 600px;
      }
    </style>
  </head>
  <body>
    <h1></h1>
    <pre id="messages"></pre>
    <input type="text" id="messageBox" placeholder="입찰 가격을 입력하세요." />
    <button id="send" title="Send Message">입찰</button>
    <button id="leave" title="Leave Room">나가기</button>

    <script>
      function isNumeric(input) {
        return /^[1-9][0-9]*$/.test(input);
      }

      function getQueryParams() {
        const queryParams = {};
        const queryString = window.location.search.slice(1);
        const paramPairs = queryString.split('&');
        paramPairs.forEach((pair) => {
          const [key, value] = pair.split('=');
          queryParams[key] = decodeURIComponent(value);
        });
        return queryParams;
      }

      function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return null;
      }

      const queryParams = getQueryParams();
      const itemId = queryParams.itemId;
      const itemName = queryParams.itemName;
      const startDate = queryParams.startDate;
      const endDate = queryParams.endDate;

      if (itemName) {
        const h1Element = document.querySelector('h1');
        h1Element.innerHTML = `${itemName} 실시간 경매방<br>시작: ${startDate}<br>종료: ${endDate}`;
      }
    </script>

    <script>
      function showMessage(message) {
        messages.textContent += `\n\n${message}`;
        messages.scrollTop = messages.scrollHeight;
        messageBox.value = '';
      }

      function showError(message) {
        const centerElement = document.createElement('div'); // Create a container for centered content
        centerElement.style.textAlign = 'center'; // Center align content
        const errorElement = document.createElement('div'); // Create an element for the error message
        errorElement.textContent = message; // Set the error message text
        errorElement.style.color = 'red'; // Set error message color to red

        const existingErrorElement = document.querySelector('#centeredError'); // Check if already exists
        if (existingErrorElement) {
          existingErrorElement.remove(); // Remove the existing centered error element
        }

        errorElement.id = 'errorMessage'; // Set an ID for the error message element
        centerElement.id = 'centeredError'; // Set an ID for the centered container
        centerElement.appendChild(errorElement); // Append error message inside the centered container

        const messagesContainer = document.querySelector('#messages');
        messagesContainer.insertAdjacentElement('afterend', centerElement); // Place the centered container below the messages
      }

      function showBidStatus(text) {
        const centerElement = document.createElement('div'); // Create a container for centered content
        centerElement.style.textAlign = 'center'; // Center align content
        const bidInfoElement = document.createElement('div'); // Create an element for bid information
        bidInfoElement.textContent = text; // Set the bid information text
        bidInfoElement.style.fontWeight = 'bold'; // Make the text bold

        const existingCenterElement =
          document.querySelector('#centeredBidInfo'); // Check if already exists
        if (existingCenterElement) {
          existingCenterElement.remove(); // Remove the existing centered element
        }

        bidInfoElement.id = 'bidInfo'; // Set an ID for the bid information element
        centerElement.id = 'centeredBidInfo'; // Set an ID for the centered container
        centerElement.appendChild(bidInfoElement); // Append bid info inside the centered container

        const h1Element = document.querySelector('h1');
        h1Element.insertAdjacentElement('afterend', centerElement); // Place the centered container below '종료'
      }

      async function getHighestBid(itemId) {
        try {
          const response = await fetch(`http://127.0.0.1:3000/bids/${itemId}`);
          const bid = await response.json();

          if (bid.hasOwnProperty('statusCode')) {
            throw new Error('No room for this item found.');
          }

          const price = bid.price;

          const bidInfo =
            price === 0
              ? `입찰 없음`
              : `최고 입찰가: ${bid.price}원 - ${bid.name}(${bid.email})`;

          showBidStatus(bidInfo);
        } catch (error) {
          console.error('Bid error:', error.message);
        }
      }

      const sendButton = document.querySelector('#send');
      const leaveButton = document.querySelector('#leave');
      const messages = document.querySelector('#messages');
      const messageBox = document.querySelector('#messageBox');

      async function manageSocket(itemId) {
        try {
          const response = await fetch(`http://127.0.0.1:3000/rooms/${itemId}`);
          const data = await response.json();
          const roomId = data._id;

          const socket = io(`http://127.0.0.1:3000`, {
            withCredentials: true,
            extraHeaders: {
              access_token: getCookie('access_token'),
              session_id: getCookie('session_id'),
            },
            query: {
              item_id: itemId,
              room_id: roomId,
            },
          });

          socket.on('connect', () => {
            console.log('Connected to WebSocket server.');
          });

          socket.on('join', (data) => {
            showMessage(data);
          });

          socket.on('leave', (data) => {
            showMessage(data);
          });

          socket.on('message', async (data) => {
            showMessage(data);
            await getHighestBid(itemId);
          });

          socket.on('disconnect', () => {
            console.log('Disconnected from WebSocket server.');
          });

          socket.on('error', (error) => {
            console.log(error.message);
            if (error && error.message) {
              if (error.message.startsWith('No room')) {
                showError('경매방이 존재하지 않습니다!');
                console.error('Room error:', error.message);
              } else if (error.message.startsWith('No item')) {
                showError('상품이 존재하지 않습니다!');
                console.error('Item error:', error.message);
              } else if (error.message.startsWith('Error joining')) {
                showError('경매방 입장 중 오류가 발생했습니다!');
                console.error('Joining error:', error.message);
              } else if (error.message.startsWith('Error leaving')) {
                showError('경매방 퇴장 중 오류가 발생했습니다!');
                console.error('Leaving error:', error.message);
              } else if (error.message.startsWith('Error sending')) {
                showError('입찰 중 오류가 발생했습니다!');
                console.error('Messaging error:', error.message);
              } else {
                showError('오류가 발생했습니다!');
                console.error('Generic error:', error.message);
              }
            }
          });

          sendButton.onclick = function () {
            if (socket.connected) {
              const messageContent = messageBox.value.trim();

              if (isNumeric(messageContent)) {
                socket.emit('message', {
                  content: messageContent,
                  roomId: roomId,
                  sessionId: getCookie('session_id'),
                });
                showMessage(`본인: ${messageBox.value}`);
              } else {
                showError('숫자만 입력할 수 있습니다!');
              }
            } else {
              showError('실시간 연결이 되어있지 않습니다!');
            }
          };

          leaveButton.onclick = function () {
            if (socket.connected) {
              socket.emit('leave', { roomId });
            }

            window.history.back();
          };
        } catch (error) {
          showError('경매방이 존재하지 않습니다!');
          console.error('Room error: No room for this item found.');
        }
      }

      getHighestBid(itemId);
      manageSocket(itemId);
    </script>
  </body>
</html>
